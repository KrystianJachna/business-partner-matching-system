spring.application.name=business-partner-matching

spring.datasource.url=jdbc:postgresql://localhost:5432/business_matching_db
spring.datasource.username=matching_user
spring.datasource.password=matching_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true