services:
  postgres:
    image: postgres:16
    container_name: business_matching_postgres
    environment:
      POSTGRES_DB: business_matching_db
      POSTGRES_USER: matching_user
      POSTGRES_PASSWORD: matching_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: